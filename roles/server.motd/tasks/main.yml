---
- name: Install figlet
  ansible.builtin.apt:
    name: figlet
    state: present
  become: yes

- name: Remove /etc/motd
  ansible.builtin.file:
    path: /etc/motd
    state: absent
  become: yes

- name: Remove /etc/update-motd.d
  ansible.builtin.file:
    path: /etc/update-motd.d
    state: absent
  become: yes

- name: Install update motd
  ansible.builtin.git:
    repo: "https://github.com/adaxi/update-motd.git"
    dest: /etc/update-motd.d
    clone: yes
    update: no
  become: yes

- name: Symlink /var/run/motd to /etc/motd
  ansible.builtin.file:
    dest: /etc/motd
    src: /var/run/motd
    state: link
    force: yes
    follow: false
  become: yes
