---

- name: Installing packages with APT
  ansible.builtin.apt:
    name: openssl
    state: present

- name: Install OpenSSL configuration file to Generate Self Signed Certificates
  ansible.builtin.template:
    src: etc-ssl-openssl.cnf.j2
    dest: /etc/ssl/openssl.cnf
    owner: root
    group: root
    mode: '0644'

- name: Create strong DH Group (this can take several minutes)
  ansible.builtin.command: "openssl dhparam -out /etc/ssl/private/dhparams.pem 2048"
  become: yes
  args:
    creates: /etc/ssl/private/dhparams.pem

- name: Include letsencrypt tasks
  ansible.builtin.include_tasks: letsencrypt.yml

- name: Include external certificate tasks
  ansible.builtin.include_tasks: external.yml

- name: Include self-signed certificate tasks
  ansible.builtin.include_tasks: self-signed.yml
