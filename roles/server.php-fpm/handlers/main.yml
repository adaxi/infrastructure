---
- name: Restart webserver
  ansible.builtin.service:
    name: nginx
    state: restarted
  become: yes
  notify: Restart php-fpm
  when: php_enable_webserver

- name: Restart php-fpm
  ansible.builtin.service:
    name: "{{ php_fpm_daemon }}"
    state: restarted
  become: yes
  when: php_enable_php_fpm
